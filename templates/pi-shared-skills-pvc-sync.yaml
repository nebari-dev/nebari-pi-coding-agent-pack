{{- if and .Values.pi.enabled .Values.pi.sharedSkills.enabled (eq .Values.pi.sharedSkills.mode "pvc-subpath") .Values.pi.sharedSkills.sync.enabled }}
{{- $fullName := include "nebari-pi-pack.fullname" . -}}
{{- $sourceType := (default "url" .Values.pi.sharedSkills.sync.source.type) | lower -}}
{{- $sourceSha256 := default "" .Values.pi.sharedSkills.sync.source.sha256 -}}
{{- $sourceAuth := default (dict) .Values.pi.sharedSkills.sync.source.auth -}}
{{- $sourceAuthSecret := default "" $sourceAuth.secretName -}}
{{- $sourceAuthTokenKey := default "token" $sourceAuth.tokenKey -}}
{{- $releaseId := default (printf "helm-r%d" .Release.Revision) .Values.pi.sharedSkills.sync.releaseId -}}
{{- $syncJobName := printf "%s-pi-shared-skills-sync-r%d" $fullName .Release.Revision | trunc 63 | trimSuffix "-" -}}
{{- if ne $sourceType "url" }}
{{- fail "pi.sharedSkills.sync.source.type must be 'url'" }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $syncJobName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-pi-pack.labels" . | nindent 4 }}
    app.kubernetes.io/component: pi-shared-skills-sync
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/component: pi-shared-skills-sync
    spec:
      restartPolicy: Never
      containers:
        - name: sync
          image: {{ .Values.pi.sharedSkills.sync.job.image | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: SOURCE_URL
              value: {{ required "pi.sharedSkills.sync.source.url is required" .Values.pi.sharedSkills.sync.source.url | quote }}
            - name: SOURCE_SHA256
              value: {{ $sourceSha256 | quote }}
            {{- if $sourceAuthSecret }}
            - name: SOURCE_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $sourceAuthSecret | quote }}
                  key: {{ $sourceAuthTokenKey | quote }}
            {{- end }}
            - name: RELEASE_ID
              value: {{ $releaseId | quote }}
            - name: KEEP_RELEASES
              value: {{ .Values.pi.sharedSkills.sync.keepReleases | quote }}
            - name: PVC_MOUNT_PATH
              value: {{ .Values.pi.sharedSkills.sync.pvcMountPath | quote }}
            - name: TARGET_SUBPATH
              value: {{ .Values.pi.sharedSkills.pvcSubPath | quote }}
          command:
            - sh
            - -lc
            - |
              set -eu

              target_path="${TARGET_SUBPATH#/}"
              if [ -z "$target_path" ]; then
                echo "TARGET_SUBPATH resolved empty" >&2
                exit 2
              fi

              release_safe="$(echo "$RELEASE_ID" | tr -cd 'A-Za-z0-9._-' | tr '[:upper:]' '[:lower:]')"
              if [ -z "$release_safe" ]; then
                echo "Invalid RELEASE_ID: $RELEASE_ID" >&2
                exit 3
              fi

              base="${PVC_MOUNT_PATH}/${target_path}"
              release_dir="${base}/releases/${release_safe}"
              tmp_tar="/tmp/skills.tar.gz"

              if [ -n "${SOURCE_AUTH_TOKEN:-}" ]; then
                wget -q --header="Authorization: Bearer ${SOURCE_AUTH_TOKEN}" -O "$tmp_tar" "$SOURCE_URL"
              else
                wget -q -O "$tmp_tar" "$SOURCE_URL"
              fi

              if [ -n "${SOURCE_SHA256:-}" ]; then
                echo "${SOURCE_SHA256}  ${tmp_tar}" | sha256sum -c -
              fi

              mkdir -p "$release_dir"
              find "$release_dir" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
              tar -xzf "$tmp_tar" -C "$release_dir"
              ln -sfn "releases/${release_safe}" "${base}/current"

              if [ "${KEEP_RELEASES:-0}" -gt 0 ] 2>/dev/null; then
                rel_base="${base}/releases"
                mkdir -p "$rel_base"
                cd "$rel_base"
                count=0
                for d in $(ls -1dt * 2>/dev/null); do
                  count=$((count + 1))
                  if [ "$count" -le "${KEEP_RELEASES}" ]; then
                    continue
                  fi
                  rm -rf -- "$d"
                done
              fi

              echo "Shared skills synced to ${base}/current (release=${release_safe})"
          volumeMounts:
            - name: shared-home
              mountPath: {{ .Values.pi.sharedSkills.sync.pvcMountPath | quote }}
      volumes:
        - name: shared-home
          persistentVolumeClaim:
            claimName: {{ required "pi.sharedSkills.pvcName is required for pvc-subpath sync" .Values.pi.sharedSkills.pvcName }}
{{- end }}
