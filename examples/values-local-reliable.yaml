# values-local-reliable.yaml
# Stable local testing profile for Pi in k3d.

nebariapp:
  enabled: true
  hostname: jupyter.nebari.local
  service:
    name: proxy-public
    port: 80
  auth:
    enabled: true
    provider: keycloak
    provisionClient: true
    redirectURI: /hub/oauth_callback
    scopes:
      - openid
      - profile
      - email
      - groups

pi:
  enabled: true
  image:
    repository: localhost:5001/nebari-pi-agent
    tag: baked-20260319-153528
  launcher:
    serviceName: pi-launcher
    port: 10300
    liveShareEnabled: false
  sharing:
    enabled: true
    sessionMaxBytes: 1048576
  sharedSkills:
    enabled: true
    mode: image
    imagePath: /opt/nebari/baked-skills/shared-skills

relay:
  enabled: false

jupyterhub:
  prePuller:
    hook:
      enabled: false
    continuous:
      enabled: false

  singleuser:
    image:
      pullPolicy: IfNotPresent
    nodeSelector:
      kubernetes.io/hostname: k3d-nebari-local-agent-1

  custom:
    external-url: ""
    pi-image: quay.io/openteams/pi-coding-agent-demo@sha256:c956ca3951b4c49241346ca81dda7e5ddd9e7a184ddf7199515891f57a0f861e
    pi-skills-path: /opt/nebari/baked-skills/shared-skills
    pi-launcher-port: 10300
    pi-launcher-service-name: pi-launcher
    pi-live-share-enabled: false
    pi-sharing-namespace: data-science
    pi-share-session-max-bytes: 1048576
    pi-hub-api-url: http://hub:8081/hub/api
    pi-proxy-url: http://proxy-public
    pi-coding-agent-dir: /tmp/pi-agent
    pi-m4-tools-service-name: pi-m4-tools
