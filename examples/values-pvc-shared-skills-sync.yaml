# values-pvc-shared-skills-sync.yaml
# Example production-style shared-skills delivery using pvc-subpath + sync rotation.
#
# Recommended workflow:
# - publish immutable skills tarball artifacts from CI (e.g., GitHub Releases)
# - pin URL + SHA256 here
# - set releaseId to the same version/commit tag
#
# Requires:
# - shared RWX PVC (default: shared-storage)
# - reachable artifact URL (private endpoints supported via bearer token secret)

nebariapp:
  enabled: true
  hostname: jupyter.nebari.local

pi:
  enabled: true
  image:
    repository: localhost:5001/nebari-pi-agent
    tag: dev-20260227-115444
  sharing:
    enabled: true
  sharedSkills:
    enabled: true
    mode: pvc-subpath
    pvcName: shared-storage
    pvcSubPath: shared-skills
    sync:
      enabled: true
      # Set to the artifact version (e.g. git SHA/tag) for clear rollback history.
      releaseId: "skills-0123456789ab"
      keepReleases: 5
      pvcMountPath: /mnt/share
      source:
        # Recommended production mode: immutable URL artifact from CI.
        type: url
        url: "https://github.com/nenb/nebari-agent-skills/releases/download/pi-shared-skills-0123456789ab/shared-skills-0123456789ab.tar.gz"
        sha256: "replace-with-artifact-sha256"
        # Optional bearer token for private release/download endpoints.
        auth:
          secretName: ""
          tokenKey: token
      job:
        image: alpine:3.20

relay:
  enabled: false

jupyterhub:
  prePuller:
    hook:
      enabled: false
    continuous:
      enabled: false
  singleuser:
    image:
      pullPolicy: IfNotPresent
    nodeSelector:
      kubernetes.io/hostname: k3d-nebari-local-agent-1
  custom:
    external-url: ""
    pi-image: localhost:5001/nebari-pi-agent@sha256:26bf1935951c51122cc1bfc5b7d9abde1b01881fb98d9ca7166563c66f770c75
    pi-coding-agent-dir: /tmp/pi-agent
    pi-sharing-namespace: data-science
  hub:
    extraEnv:
      NEBARI_SHARED_SKILLS_MODE: pvc-subpath
      NEBARI_SHARED_SKILLS_PVC_NAME: shared-storage
      NEBARI_SHARED_SKILLS_PVC_SUBPATH: shared-skills
