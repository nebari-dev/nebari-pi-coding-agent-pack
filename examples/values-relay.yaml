# values-relay.yaml
# Relay-enabled local profile.

nebariapp:
  enabled: true
  hostname: jupyter.nebari.local

pi:
  enabled: true
  image:
    repository: quay.io/nebari/pi-agent
    tag: latest
  launcher:
    serviceName: pi-launcher
    port: 10300
  sharing:
    enabled: true
  sharedSkills:
    enabled: true
    mode: image
    imagePath: /opt/nebari/baked-skills/shared-skills

relay:
  enabled: true
  deployMode: configmap
  nebariapp:
    enabled: false
    hostname: relay.nebari.local
    auth:
      enabled: false
  messageUserMap:
    "dummy:test-user-1": "nebari-admin"
  core:
    serviceName: pi-relay-core
    deploymentName: pi-relay-core
    serviceAccountName: pi-relay-core
    hubApiUrl: http://hub:8081/hub/api
    usePiM4Token: true
    piAgentDir: /tmp/pi-agent
    storageType: emptyDir
    statePvcName: ""
    stateSubPath: relay-state
    idempotencyBackend: sqlite
    idempotencyPath: /var/lib/relay/idempotency.db
  dummy:
    path: /relay/dummy/simulate
    statusPath: /relay/dummy/status
  slack:
    path: /relay/slack/events
  whatsapp:
    path: /relay/whatsapp/webhook

jupyterhub:
  custom:
    external-url: ""
    pi-image: quay.io/nebari/pi-agent:latest
    pi-skills-path: /opt/nebari/baked-skills/shared-skills
    pi-coding-agent-dir: /tmp/pi-agent
    pi-sharing-namespace: data-science
